<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}BUSCAS PESSOAIS{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/base/base.css') }}">

    {% block css_extra %}{% endblock %}
</head>

<body>
    <!-- MENU LATERAL -->
    <nav class="menu-lateral" id="menuLateral">
        <div class="menu-header">
            <span class="logo-icone">🚀</span>
            <h2>TESTE</h2>
            <button class="btn-fechar" onclick="fecharMenu()">✕</button>
        </div>

        <ul class="menu-links">
            <li>
                <a href="{{ url_for('ini_app') }}" class="{% if request.path.startswith('/') %}ativo{% endif %}">
                    <span class="icone">🏠</span>
                    <span class="texto">LINKS PAGINAS</span>
                </a>
            </li>

            <!-- ==========================================
                 SEPARADOR (linha visual)
            ========================================== -->
            <li class="menu-divisor"></li>

            <!-- ==========================================
                 CONFIGURAÇÕES
            ========================================== -->
            <li>
                <a href="#" class="{% if request.path.startswith('/') %}ativo{% endif %}">
                    <span class="icone">⚙️</span>
                    <span class="texto">Configurações</span>
                </a>
            </li>

        </ul>

        <div class="menu-footer">
            <span>v1.0</span>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo-principal" id="conteudoPrincipal">
        <header class="topo-mobile">
            <button class="btn-hamburguer" onclick="abrirMenu()">☰</button>
            <h1>{% block titulo_pagina %}Dashboard{% endblock %}</h1>
        </header>

        <main class="conteudo">
            {% block conteudo %}{% endblock %}
        </main>
    </div>

    <div class="overlay" id="overlay" onclick="fecharMenu()"></div>

    <script src="{{ url_for('static', filename='js/base/mobile_menu.js') }}"></script>
    {% block js_extra %}{% endblock %}
</body>

</html>
